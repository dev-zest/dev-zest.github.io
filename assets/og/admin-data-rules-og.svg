<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#e9eee9"/>
  <rect x="56" y="54" width="1088" height="522" rx="20" fill="#ffffff" stroke="#123d37" stroke-opacity=".18"/>

  <text x="84" y="105" fill="#1f6f68" font-family="Arial, Apple SD Gothic Neo, sans-serif"
        font-size="18" font-weight="700" letter-spacing="2.1">WRITING / PRODUCT OPERATIONS 02</text>

  <text x="84" y="210" fill="#171717" font-family="Arial, Apple SD Gothic Neo, sans-serif"
        font-size="55" font-weight="700">
    <tspan x="84" dy="0">어드민 화면보다 먼저</tspan>
    <tspan x="84" dy="72">정리해야 했던 데이터의 기준</tspan>
  </text>

  <text x="87" y="398" fill="#62615c" font-family="Arial, Apple SD Gothic Neo, sans-serif"
        font-size="23">
    <tspan x="87" dy="0">운영 업무와 포함·제외 기준이 불명확하면</tspan>
    <tspan x="87" dy="34">화면과 코드가 함께 복잡해집니다.</tspan>
  </text>

  <g transform="translate(808 150)" font-family="Menlo, Consolas, monospace">
    <rect x="0" y="0" width="314" height="242" rx="16" fill="#123d37"/>
    <text x="28" y="43" fill="#9fd8ce" font-size="14" font-weight="700">DATA RULES / CHECK</text>
    <g font-size="16">
      <text x="28" y="91" fill="#f7f7f3">TEST DATA</text>
      <text x="250" y="91" fill="#9fd8ce">OUT</text>
      <line x1="28" y1="108" x2="286" y2="108" stroke="#9fd8ce" stroke-opacity=".28"/>
      <text x="28" y="143" fill="#f7f7f3">PERIOD</text>
      <text x="228" y="143" fill="#9fd8ce">FIXED</text>
      <line x1="28" y1="160" x2="286" y2="160" stroke="#9fd8ce" stroke-opacity=".28"/>
      <text x="28" y="195" fill="#f7f7f3">EXCEPTION</text>
      <text x="216" y="195" fill="#9fd8ce">NAMED</text>
    </g>
  </g>

  <text x="84" y="540" fill="#1f6f68" font-family="Arial, Apple SD Gothic Neo, sans-serif"
        font-size="18">JSIM · Product Systems Engineer</text>
